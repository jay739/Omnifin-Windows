name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore .\OmnifinNative\OmnifinNative.csproj

      - name: Check formatting and analyzers
        run: dotnet format .\OmnifinNative\OmnifinNative.csproj --verify-no-changes --no-restore

      - name: Build project
        run: dotnet build .\OmnifinNative\OmnifinNative.csproj -c Release --no-restore -warnaserror

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore .\OmnifinNative\OmnifinNative.csproj

      - name: Publish Windows x64 executable
        run: >
          dotnet publish .\OmnifinNative\OmnifinNative.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          -o .\artifacts\publish

      - name: Package publish output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          Compress-Archive -Path .\artifacts\publish\* -DestinationPath .\artifacts\OmnifinNative-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmnifinNative-win-x64
          path: .\artifacts\OmnifinNative-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: .\artifacts\OmnifinNative-win-x64.zip
name: Release Windows MSIX

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore .\OmnifinNative\OmnifinNative.csproj -r win-x64

      - name: Validate formatting and build
        run: >
          dotnet format .\OmnifinNative\OmnifinNative.csproj --verify-no-changes --no-restore
          && dotnet build .\OmnifinNative\OmnifinNative.csproj -c Release -r win-x64 --no-restore -warnaserror /p:PublishReadyToRun=false /p:DebugType=None /p:DebugSymbols=false

      - name: Build MSIX package
        run: >
          dotnet build .\OmnifinNative\OmnifinNative.csproj
          -c Release
          -r win-x64
          --no-restore
          /p:PublishReadyToRun=false
          /p:WindowsPackageType=MSIX
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageSigningEnabled=false
          /p:DebugType=None
          /p:DebugSymbols=false
          /p:PublishTrimmed=false

      - name: Stage MSIX package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          $package = Get-ChildItem .\AppPackages -Recurse -Filter 'OmnifinNative_*.msix' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $package) { throw 'MSIX package was not produced.' }
          Copy-Item $package.FullName .\artifacts\OmnifinNative-win-x64.msix -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmnifinNative-win-x64-msix
          path: .\artifacts\OmnifinNative-win-x64.msix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: .\artifacts\OmnifinNative-win-x64.msix